name: Test PR

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.asm'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y nasm binutils

      - name: Run tests
        run: |
          chmod +x .github/scripts/test-program.sh
          .github/scripts/test-program.sh