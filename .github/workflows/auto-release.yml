name: Auto Release

on:
  push:
    paths:
      - 'releases.txt'
    branches:
      - main

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse releases.txt and check for new release
        id: parse
        run: |
          chmod +x .github/scripts/parse-release.sh
          .github/scripts/parse-release.sh

      - name: Install build dependencies
        if: steps.parse.outputs.new_release == 'true'
        run: sudo apt-get install -y nasm binutils

      - name: Build nasmserver binary
        if: steps.parse.outputs.new_release == 'true'
        run: |
          chmod +x buildasm.sh
          ./buildasm.sh program.asm
          mv program nasmserver

      - name: Package www/
        if: steps.parse.outputs.new_release == 'true'
        run: cd www && zip -r ../www.zip .

      - name: Generate release notes
        if: steps.parse.outputs.new_release == 'true'
        id: notes
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          .github/scripts/generate-release-notes.sh "${{ steps.parse.outputs.version }}" "${{ steps.parse.outputs.previous_commit }}"

      - name: Create GitHub Release
        if: steps.parse.outputs.new_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.parse.outputs.version }}
          name: ${{ steps.parse.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            .env.example
            www.zip
            nasmserver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}