name: Test and Revert

on:
  push:
    branches:
      - main
    paths:
      - '**/*.asm'

permissions:
  contents: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip merge commits
        id: check_merge
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if echo "$COMMIT_MSG" | grep -qE "^Merge (pull request|branch)"; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        if: steps.check_merge.outputs.is_merge == 'false'
        run: sudo apt-get install -y nasm binutils

      - name: Run tests
        if: steps.check_merge.outputs.is_merge == 'false'
        id: tests
        run: |
          chmod +x .github/scripts/test-program.sh
          .github/scripts/test-program.sh
        continue-on-error: true

      - name: Revert and move to branch
        if: steps.check_merge.outputs.is_merge == 'false' && steps.tests.outcome == 'failure'
        id: revert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # collect all commits from this push
          BEFORE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          COMMITS=$(git log --pretty=format:"%h" "$BEFORE".."$HEAD")
          COMMIT_LIST=$(git log --pretty=format:"- \`%h\` %s" "$BEFORE".."$HEAD")

          # create a rescue branch with the broken commits
          BRANCH="revert/failed-$(echo $HEAD | cut -c1-7)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          # go back to main and revert all commits from this push
          git checkout main
          for COMMIT in $COMMITS; do
            git revert --no-commit "$COMMIT"
          done
          git commit -m "revert: failed tests on push $HEAD"
          git push origin main

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit_list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue
        if: steps.check_merge.outputs.is_merge == 'false' && steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.revert.outputs.branch }}
          COMMIT_LIST: ${{ steps.revert.outputs.commit_list }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const commitList = process.env.COMMIT_LIST;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tests failed — reverted push ${context.sha.slice(0, 7)}`,
              body: [
                "The following commits were pushed to `main` and caused test failures. They have been reverted and moved to `" + branch + "`.",
                "",
                "**Reverted commits:**",
                commitList,
                "",
                "Once fixed, open a pull request from `" + branch + "` back into `main`.",
              ].join("\n"),
              labels: ["bug"],
            });